<style>
:root{--bg:#080c14;--surface:#111827;--gold:#f59e0b;--text:#f0f4ff;--muted:#7a8faa;--green:#22c55e;--border:#2a3a55;}
*{box-sizing:border-box;margin:0;padding:0;}
body{overflow-x:hidden;font-family:'Noto Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;
  background-image:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(245,158,11,0.08) 0%,transparent 60%);}
.page{max-width:420px;width:100%;text-align:center;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;color:var(--gold);margin-bottom:24px;}
.logo span{color:var(--text);}

/* CERTIFICATE CARD */
.cert-card{
  background:linear-gradient(135deg,#0d1420 0%,#1a2235 50%,#0d1420 100%);
  border:2px solid var(--gold);
  border-radius:20px;
  padding:28px 24px;
  margin-bottom:24px;
  position:relative;
  overflow:hidden;
}
.cert-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%,rgba(245,158,11,0.12) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 100%,rgba(245,158,11,0.06) 0%,transparent 60%);
  pointer-events:none;
}
.cert-header{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;opacity:0.8;}
.cert-photo{
  width:80px;height:80px;border-radius:50%;
  border:3px solid var(--gold);
  margin:0 auto 16px;
  object-fit:cover;
  display:block;
}
.cert-photo-placeholder{
  width:80px;height:80px;border-radius:50%;
  border:3px solid var(--gold);
  background:var(--surface);
  margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
}
.cert-name{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:3px;color:var(--text);line-height:1;margin-bottom:8px;}
.cert-role{display:inline-block;padding:4px 16px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:16px;}
.role-BAT{background:#1e3a5f;color:#93c5fd;}
.role-BOWL{background:#3f1515;color:#fca5a5;}
.role-ALL{background:#14391f;color:#86efac;}
.role-WK{background:#3d2608;color:#fcd34d;}
.cert-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.cert-amount{font-family:'Bebas Neue',sans-serif;font-size:56px;color:var(--gold);letter-spacing:2px;line-height:1;margin-bottom:4px;}
.cert-arrow{font-size:14px;color:var(--muted);margin-bottom:16px;}
.cert-team{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--text);}
.cert-divider{border:none;border-top:1px solid rgba(245,158,11,0.2);margin:16px 0;}
.cert-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:center;}
.cert-meta-val{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--text);}
.cert-meta-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
.cert-rank{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:8px 12px;margin-top:12px;font-size:13px;color:var(--gold);}
.cert-footer{font-size:10px;color:rgba(245,158,11,0.4);margin-top:16px;letter-spacing:2px;text-transform:uppercase;}

/* BUTTONS */
.download-btn{
  width:100%;padding:16px;
  background:var(--gold);color:#000;
  border:none;border-radius:12px;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;
  cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:12px;
}
.download-btn:hover{background:#fbbf24;transform:translateY(-2px);}
.share-btn{
  width:100%;padding:14px;
  background:transparent;color:var(--text);
  border:1px solid var(--border);border-radius:12px;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;
  cursor:pointer;transition:all 0.2s;
  margin-bottom:12px;
}
.share-btn:hover{border-color:var(--gold);color:var(--gold);}
.loading{text-align:center;padding:60px 20px;color:var(--muted);}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{text-align:center;padding:40px 20px;}
</style>
</head>
<body>
<div class="page">
  <div class="logo">captain<span>XI</span>.com</div>

  <div id="loadingScreen" class="loading">
    <div class="spinner"></div>
    <div>Loading your certificate...</div>
  </div>

  <div id="errorScreen" class="error-box" style="display:none;">
    <div style="font-size:40px;margin-bottom:12px;">❌</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:8px;">Certificate Not Found</div>
    <div style="font-size:14px;color:var(--muted);" id="errorMsg">This certificate link is invalid.</div>
  </div>

  <div id="certScreen" style="display:none;">
    <!-- THE CERTIFICATE -->
    <div class="cert-card" id="certCard">
      <div class="cert-header">🏏 Official Player Auction Certificate</div>
      <div id="certPhotoArea"></div>
      <div class="cert-name" id="certName">Player Name</div>
      <div><span class="cert-role role-BAT" id="certRole">BAT</span></div>
      <br>
      <div class="cert-label">Sold For</div>
      <div class="cert-amount" id="certAmount">₹0</div>
      <div class="cert-arrow">Bought by</div>
      <div class="cert-team" id="certTeam">Team Name</div>
      <hr class="cert-divider">
      <div class="cert-meta">
        <div>
          <div class="cert-meta-val" id="certAuction">—</div>
          <div class="cert-meta-lbl">Tournament</div>
        </div>
        <div>
          <div class="cert-meta-val" id="certDate">—</div>
          <div class="cert-meta-lbl">Date</div>
        </div>
      </div>
      <div class="cert-rank" id="certRank" style="display:none;"></div>
      <div class="cert-footer">captainXI.com</div>
    </div>

    <button class="download-btn" onclick="downloadCard()">📥 Download HD Card — ₹10</button>
    <button class="share-btn" onclick="shareWhatsApp()">📱 Share on WhatsApp (Free)</button>
    <div class="download-note" style="font-size:12px;color:var(--muted);text-align:center;">View is free. HD download with your photo is ₹10 only.</div>
    <div id="certPayMsg" style="font-size:12px;margin-top:6px;min-height:16px;text-align:center;"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://ofondrfejzcznxsvpuec.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mb25kcmZlanpjem54c3ZwdWVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDk5MzMsImV4cCI6MjA4OTE4NTkzM30.5YfDMi0BM07PPJVcp9pfXSg6L5fDldec3usswJQd6no';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const params=new URLSearchParams(window.location.search);
const saleId=params.get('sale');
const playerId=params.get('player');
const auctionId=params.get('auction');

let saleData=null;
let hasPaidForDownload=false; // Track if user already paid

(async()=>{
  if(!saleId&&!playerId){showError('No certificate ID in this link.');return;}
  let sale=null;
  if(saleId){
    const{data}=await sb.from('sales').select('*,players(*),teams(*),auctions(*)').eq('id',saleId).single();
    sale=data;
  } else if(playerId&&auctionId){
    const{data}=await sb.from('sales').select('*,players(*),teams(*),auctions(*)').eq('player_id',playerId).eq('auction_id',auctionId).single();
    sale=data;
  }
  if(!sale){showError('This player was not sold in this auction.');return;}
  saleData=sale;
  // Check if already paid for this certificate
  try{
    const{data:existingPayment}=await sb.from('certificate_payments').select('id').eq('sale_id',sale.id).limit(1).single();
    if(existingPayment){hasPaidForDownload=true;updateDownloadBtn();}
  }catch(e){}
  // Calculate rank
  const{data:allSales}=await sb.from('sales').select('amount').eq('auction_id',sale.auction_id).order('amount',{ascending:false});
  const rank=(allSales||[]).findIndex(s=>Number(s.amount)===Number(sale.amount))+1;
  const total=allSales?.length||1;
  renderCert(sale,rank,total);
})();

function updateDownloadBtn(){
  const btn=document.querySelector('.download-btn');
  if(hasPaidForDownload){
    btn.textContent='📥 Download HD Card';
    btn.onclick=generateHDImage;
    const noteEl=document.querySelector('.download-note');
    if(noteEl)noteEl.textContent='✅ Paid — download anytime!';
  }
}

function renderCert(sale,rank,total){
  const p=sale.players;const t=sale.teams;const a=sale.auctions;
  const photoArea=document.getElementById('certPhotoArea');
  if(p?.photo_url){
    photoArea.innerHTML='<img src="'+p.photo_url+'" class="cert-photo" alt="'+p.name+'" crossorigin="anonymous">';
  } else {
    photoArea.innerHTML='<div class="cert-photo-placeholder">🏏</div>';
  }
  document.getElementById('certName').textContent=p?.name||'Unknown';
  const roleEl=document.getElementById('certRole');
  roleEl.textContent=p?.role||'BAT';
  roleEl.className='cert-role role-'+(p?.role||'BAT');
  document.getElementById('certAmount').textContent='₹'+Number(sale.amount).toLocaleString('en-IN');
  document.getElementById('certTeam').textContent=t?.name||'Unknown Team';
  document.getElementById('certAuction').textContent=(a?.name||'—').substring(0,20);
  document.getElementById('certDate').textContent=new Date(sale.sold_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  if(rank===1){
    const rankEl=document.getElementById('certRank');
    rankEl.style.display='block';
    rankEl.textContent='🏆 Most Expensive Player in this Auction!';
  } else if(rank<=3){
    const rankEl=document.getElementById('certRank');
    rankEl.style.display='block';
    rankEl.textContent='🥇 #'+rank+' Most Expensive of '+total+' players sold';
  }
  if(p?.star){
    const rankEl=document.getElementById('certRank');
    rankEl.style.display='block';
    rankEl.textContent='⭐ Star Player';
  }
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('certScreen').style.display='block';
}

function showError(msg){
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('errorScreen').style.display='block';
  document.getElementById('errorMsg').textContent=msg;
}

// ── HD DOWNLOAD ──────────────────────────────────────────
function downloadCard(){
  if(!saleData)return;
  if(hasPaidForDownload){generateHDImage();return;}

  const p=saleData.players;
  const msgEl=document.getElementById('certPayMsg');

  const options={
    key:'rzp_live_SYbRTBbAmBDn42',
    amount:1000,
    currency:'INR',
    name:'captainXI.com',
    description:'HD Certificate — '+p?.name,
    image:'/favicon.svg',
    theme:{color:'#f59e0b'},
    handler:async function(response){
      hasPaidForDownload=true;
      msgEl.style.color='#22c55e';
      msgEl.textContent='✅ Payment received! Generating HD card...';
      updateDownloadBtn();
      // Save payment record
      try{
        await sb.from('certificate_payments').insert({
          sale_id:saleData.id,
          player_name:p?.name||'Unknown',
          amount:10,
          razorpay_payment_id:response.razorpay_payment_id
        });
      }catch(e){}
      generateHDImage();
    },
    modal:{ondismiss:function(){
      msgEl.style.color='#7a8faa';
      msgEl.textContent='Payment cancelled. Share for free anytime!';
      setTimeout(()=>msgEl.textContent='',3000);
    }}
  };
  const rzp=new Razorpay(options);
  rzp.on('payment.failed',function(){
    msgEl.style.color='#ef4444';msgEl.textContent='Payment failed. Try again.';
  });
  rzp.open();
}

// ── CANVAS HD IMAGE GENERATION ───────────────────────────
async function generateHDImage(){
  const msgEl=document.getElementById('certPayMsg');
  msgEl.style.color='#f59e0b';msgEl.textContent='⏳ Generating HD certificate...';

  const p=saleData.players;
  const t=saleData.teams;
  const a=saleData.auctions;
  const W=1080,H=1440; // Instagram story size
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const ctx=c.getContext('2d');

  // Background
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#0a0f1a');bg.addColorStop(0.5,'#141e30');bg.addColorStop(1,'#0a0f1a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Gold glow at top
  const glow=ctx.createRadialGradient(W/2,0,0,W/2,0,500);
  glow.addColorStop(0,'rgba(245,158,11,0.15)');glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;ctx.fillRect(0,0,W,400);

  // Border
  ctx.strokeStyle='#f59e0b';ctx.lineWidth=4;
  roundRect(ctx,40,40,W-80,H-80,24);ctx.stroke();

  // Inner border
  ctx.strokeStyle='rgba(245,158,11,0.3)';ctx.lineWidth=1;
  roundRect(ctx,56,56,W-112,H-112,18);ctx.stroke();

  // Header
  ctx.fillStyle='rgba(245,158,11,0.7)';
  ctx.font='700 14px Rajdhani, sans-serif';
  ctx.letterSpacing='6px';
  ctx.textAlign='center';
  ctx.fillText('🏏  OFFICIAL PLAYER AUCTION CERTIFICATE',W/2,120);

  // Photo circle
  let photoLoaded=false;
  if(p?.photo_url){
    try{
      const img=await loadImage(p.photo_url);
      const cx=W/2,cy=280,r=100;
      ctx.save();
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.closePath();ctx.clip();
      ctx.drawImage(img,cx-r,cy-r,r*2,r*2);
      ctx.restore();
      // Gold ring
      ctx.strokeStyle='#f59e0b';ctx.lineWidth=4;
      ctx.beginPath();ctx.arc(cx,cy,r+3,0,Math.PI*2);ctx.stroke();
      photoLoaded=true;
    }catch(e){}
  }
  if(!photoLoaded){
    ctx.fillStyle='#1a2235';
    ctx.beginPath();ctx.arc(W/2,280,100,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(W/2,280,103,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#f59e0b';ctx.font='60px sans-serif';ctx.textAlign='center';
    ctx.fillText('🏏',W/2,300);
  }

  // Player name
  ctx.fillStyle='#f0f4ff';
  ctx.font='700 56px "Bebas Neue", sans-serif';
  ctx.textAlign='center';
  ctx.fillText((p?.name||'PLAYER').toUpperCase(),W/2,450);

  // Role badge
  const role=p?.role||'BAT';
  const roleColors={BAT:'#1e3a5f',BOWL:'#3f1515',ALL:'#14391f',WK:'#3d2608'};
  const roleTextColors={BAT:'#93c5fd',BOWL:'#fca5a5',ALL:'#86efac',WK:'#fcd34d'};
  const roleTxt=role;
  const rw=ctx.measureText(roleTxt).width+40;
  ctx.fillStyle=roleColors[role]||'#1e3a5f';
  roundRect(ctx,W/2-rw/2,470,rw,36,18);ctx.fill();
  ctx.fillStyle=roleTextColors[role]||'#93c5fd';
  ctx.font='700 16px Rajdhani, sans-serif';
  ctx.fillText(roleTxt,W/2,495);

  // Sold for label
  ctx.fillStyle='rgba(245,158,11,0.6)';
  ctx.font='700 14px Rajdhani, sans-serif';
  ctx.fillText('SOLD FOR',W/2,560);

  // Amount
  ctx.fillStyle='#f59e0b';
  ctx.font='700 80px "Bebas Neue", sans-serif';
  ctx.fillText('₹'+Number(saleData.amount).toLocaleString('en-IN'),W/2,650);

  // Bought by
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.font='400 16px "Noto Sans", sans-serif';
  ctx.fillText('Bought by',W/2,700);

  // Team name
  ctx.fillStyle='#f0f4ff';
  ctx.font='700 32px Rajdhani, sans-serif';
  ctx.fillText(t?.name||'Unknown Team',W/2,745);

  // Divider
  ctx.strokeStyle='rgba(245,158,11,0.25)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(140,790);ctx.lineTo(W-140,790);ctx.stroke();

  // Tournament + Date
  ctx.fillStyle='#f0f4ff';
  ctx.font='700 20px Rajdhani, sans-serif';
  ctx.fillText((a?.name||'Tournament').substring(0,25),W/2-150,840);
  ctx.fillText(new Date(saleData.sold_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}),W/2+150,840);

  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.font='400 11px Rajdhani, sans-serif';
  ctx.fillText('TOURNAMENT',W/2-150,860);
  ctx.fillText('DATE',W/2+150,860);

  // Rank badge
  const{data:allSales}=await sb.from('sales').select('amount').eq('auction_id',saleData.auction_id).order('amount',{ascending:false});
  const rank=(allSales||[]).findIndex(s=>Number(s.amount)===Number(saleData.amount))+1;
  if(rank===1){
    ctx.fillStyle='rgba(245,158,11,0.12)';
    roundRect(ctx,180,890,W-360,44,10);ctx.fill();
    ctx.strokeStyle='rgba(245,158,11,0.3)';ctx.lineWidth=1;
    roundRect(ctx,180,890,W-360,44,10);ctx.stroke();
    ctx.fillStyle='#f59e0b';ctx.font='500 15px "Noto Sans", sans-serif';
    ctx.fillText('🏆 Most Expensive Player in this Auction!',W/2,918);
  } else if(rank<=3){
    ctx.fillStyle='rgba(245,158,11,0.08)';
    roundRect(ctx,180,890,W-360,44,10);ctx.fill();
    ctx.fillStyle='#f59e0b';ctx.font='500 14px "Noto Sans", sans-serif';
    ctx.fillText('🥇 #'+rank+' Most Expensive of '+(allSales?.length||1)+' players sold',W/2,918);
  }

  // Footer branding
  ctx.fillStyle='rgba(245,158,11,0.35)';
  ctx.font='700 13px Rajdhani, sans-serif';
  ctx.letterSpacing='4px';
  ctx.fillText('CAPTAINXI.COM',W/2,H-70);

  // Decorative corner accents
  const cornerLen=40;ctx.strokeStyle='rgba(245,158,11,0.5)';ctx.lineWidth=2;
  // Top-left
  ctx.beginPath();ctx.moveTo(50,80);ctx.lineTo(50,50);ctx.lineTo(80,50);ctx.stroke();
  // Top-right
  ctx.beginPath();ctx.moveTo(W-50,80);ctx.lineTo(W-50,50);ctx.lineTo(W-80,50);ctx.stroke();
  // Bottom-left
  ctx.beginPath();ctx.moveTo(50,H-80);ctx.lineTo(50,H-50);ctx.lineTo(80,H-50);ctx.stroke();
  // Bottom-right
  ctx.beginPath();ctx.moveTo(W-50,H-80);ctx.lineTo(W-50,H-50);ctx.lineTo(W-80,H-50);ctx.stroke();

  // Download as image
  try{
    c.toBlob(function(blob){
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=(p?.name||'Player').replace(/[^a-zA-Z0-9]/g,'_')+'_Certificate.png';
      document.body.appendChild(a);
      a.click();document.body.removeChild(a);
      URL.revokeObjectURL(url);
      msgEl.style.color='#22c55e';
      msgEl.textContent='✅ HD Certificate downloaded! Share it on Instagram & WhatsApp.';
    },'image/png');
  }catch(e){
    // Fallback if toBlob fails (CORS)
    try{
      const dataUrl=c.toDataURL('image/png');
      const a=document.createElement('a');
      a.href=dataUrl;
      a.download=(p?.name||'Player').replace(/[^a-zA-Z0-9]/g,'_')+'_Certificate.png';
      a.click();
      msgEl.style.color='#22c55e';
      msgEl.textContent='✅ HD Certificate downloaded!';
    }catch(e2){
      msgEl.style.color='#ef4444';
      msgEl.textContent='Download failed due to browser restrictions. Try screenshot instead.';
    }
  }
}

function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>resolve(img);
    img.onerror=()=>reject(new Error('Image load failed'));
    img.src=src;
  });
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function shareWhatsApp(){
  if(!saleData)return;
  const p=saleData.players;const t=saleData.teams;const a=saleData.auctions;
  const url=window.location.href;
  const msg='🏏 *'+p?.name+' — Sold for ₹'+Number(saleData.amount).toLocaleString('en-IN')+'!*\n\nBought by *'+t?.name+'* in '+a?.name+'\n\n🔗 View Certificate: '+url+'\n\nPowered by captainXI.com 🏆';
