<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — AuctionXI</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&family=Noto+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#080c14;--surface:#111827;--surface2:#1a2235;--border:#2a3a55;--gold:#f59e0b;--text:#f0f4ff;--muted:#7a8faa;--green:#22c55e;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background-image:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,158,11,0.06) 0%, transparent 60%),
  linear-gradient(180deg,var(--bg) 0%,#0d1420 100%);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 40px 80px rgba(0,0,0,0.5);}
.logo{text-align:center;margin-bottom:32px;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;color:var(--gold);}
.logo-text span{color:var(--text);}
.logo-sub{font-size:13px;color:var(--muted);margin-top:4px;}
.tabs{display:flex;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:28px;}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;border-radius:8px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--muted);transition:all 0.2s;}
.tab.active{background:var(--gold);color:#000;}
.form-group{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:13px 16px;border-radius:10px;font-size:15px;outline:none;font-family:'Noto Sans',sans-serif;transition:border-color 0.2s;}
input:focus{border-color:var(--gold);}
.btn{width:100%;padding:15px;background:var(--gold);color:#000;border:none;border-radius:10px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.btn:hover{background:#fbbf24;transform:translateY(-1px);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.msg{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid var(--red);color:#fca5a5;}
.msg.success{background:rgba(34,197,94,0.1);border:1px solid var(--green);color:#86efac;}
.divider{text-align:center;color:var(--muted);font-size:12px;margin:20px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
.divider::before{left:0;} .divider::after{right:0;}
.back-link{display:block;text-align:center;margin-top:20px;color:var(--muted);font-size:13px;text-decoration:none;transition:color 0.2s;}
.back-link:hover{color:var(--gold);}
.free-badge{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:10px 14px;text-align:center;margin-bottom:24px;font-size:13px;color:var(--gold);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-text">AUCTION<span>XI</span></div>
    <div class="logo-sub">India's Premier Cricket Auction Platform</div>
  </div>

  <div class="free-badge">🏏 Start free — no credit card required</div>

  <div class="tabs">
    <div class="tab active" id="loginTab" onclick="switchTab('login')">Login</div>
    <div class="tab" id="signupTab" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <div id="msgBox" class="msg"></div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn" onclick="doLogin()" id="loginBtn">Login →</button>
    <div class="divider">or</div>
    <button class="btn" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);" onclick="switchTab('signup')">Create New Account</button>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signupForm" style="display:none;">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Your name" onkeydown="if(event.key==='Enter')doSignup()">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="signupEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doSignup()">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter')doSignup()">
    </div>
    <button class="btn" onclick="doSignup()" id="signupBtn">Create Account →</button>
    <div class="divider">or</div>
    <button class="btn" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);" onclick="switchTab('login')">Already have an account</button>
  </div>

  <a href="index.html" class="back-link">← Back to home</a>
</div>

<script>
const SUPABASE_URL='https://ofondrfejzcznxsvpuec.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mb25kcmZlanpjem54c3ZwdWVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDk5MzMsImV4cCI6MjA4OTE4NTkzM30.5YfDMi0BM07PPJVcp9pfXSg6L5fDldec3usswJQd6no';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

// Auto-redirect if already logged in
(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session) window.location.href='dashboard.html';
})();

function switchTab(tab){
  document.getElementById('loginTab').classList.toggle('active', tab==='login');
  document.getElementById('signupTab').classList.toggle('active', tab==='signup');
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('signupForm').style.display = tab==='signup'?'block':'none';
  hideMsg();
}

function showMsg(txt, type){
  const el=document.getElementById('msgBox');
  el.textContent=txt; el.className='msg '+type; el.style.display='block';
}
function hideMsg(){ document.getElementById('msgBox').style.display='none'; }

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  if(!email||!password){showMsg('Please enter email and password','error');return;}
  const btn=document.getElementById('loginBtn');
  btn.textContent='Logging in...';btn.disabled=true;hideMsg();
  const{error}=await sb.auth.signInWithPassword({email,password});
  if(error){showMsg(error.message,'error');btn.textContent='Login →';btn.disabled=false;return;}
  window.location.href='dashboard.html';
}

async function doSignup(){
  const name=document.getElementById('signupName').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const password=document.getElementById('signupPassword').value;
  if(!name){showMsg('Enter your name','error');return;}
  if(!email){showMsg('Enter your email','error');return;}
  if(password.length<6){showMsg('Password must be at least 6 characters','error');return;}
  const btn=document.getElementById('signupBtn');
  btn.textContent='Creating account...';btn.disabled=true;hideMsg();
  const{data,error}=await sb.auth.signUp({email,password});
  if(error){showMsg(error.message,'error');btn.textContent='Create Account →';btn.disabled=false;return;}
  // Create profile
  if(data.user){
    await sb.from('profiles').upsert({id:data.user.id,name,plan:'free'});
  }
  showMsg('✅ Account created! Logging you in...','success');
  // Auto login
  setTimeout(async()=>{
    const{error:loginErr}=await sb.auth.signInWithPassword({email,password});
    if(!loginErr) window.location.href='dashboard.html';
    else{showMsg('Account created! Please login.','success');switchTab('login');}
  },1000);
}
</script>
</body>
</html>
