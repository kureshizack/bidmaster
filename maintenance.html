<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaptainXI — Coming Soon</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#040c1a;color:#f1f5f9;font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
.wrap{max-width:480px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:6px;color:#f59e0b;margin-bottom:8px;}
.logo span{color:#fff;}
.badge{display:inline-block;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.4);color:#f59e0b;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:32px;}
.icon{font-size:64px;margin-bottom:24px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;margin-bottom:12px;}
p{color:#94a3b8;font-size:15px;line-height:1.7;margin-bottom:28px;}
.notify{display:flex;gap:8px;max-width:360px;margin:0 auto 16px;}
.notify input{flex:1;padding:10px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#f1f5f9;border-radius:8px;font-size:14px;font-family:'Rajdhani',sans-serif;outline:none;}
.notify input::placeholder{color:#64748b;}
.notify button{padding:10px 20px;background:#f59e0b;color:#000;border:none;border-radius:8px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;cursor:pointer;}
.footer{margin-top:40px;font-size:12px;color:#475569;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">CAPTAIN<span>XI</span></div>
  <div class="badge">🏏 Coming Soon</div>
  <div class="icon">🏟️</div>
  <h1>We're Building Something Big</h1>
  <p>CaptainXI — India's first complete cricket tournament management platform. Live auctions, player registrations, team management and more. Launching soon.</p>
  <div class="notify">
    <input type="tel" id="notifyMobile" placeholder="Your mobile number" maxlength="10" oninput="this.value=this.value.replace(/\D/g,'')">
    <button onclick="notify()">Notify Me</button>
  </div>
  <div id="notifyMsg" style="font-size:13px;min-height:18px;color:#f59e0b;"></div>
  <div class="footer">© 2026 CaptainXI · Built for Indian Cricket</div>
</div>
<script>
function notify(){
  const m=document.getElementById('notifyMobile').value.trim();
  if(m.length!==10){document.getElementById('notifyMsg').textContent='Enter valid 10-digit mobile';return;}
  document.getElementById('notifyMsg').textContent='✅ We\'ll notify you when we launch!';
  document.getElementById('notifyMobile').value='';
}
</script>
</body>
</html>
