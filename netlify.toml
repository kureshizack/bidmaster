# CaptainXI — Netlify Configuration

[build]
  publish = "."

# Redirect rules — clean URLs
[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 200

# Force HTTPS
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
