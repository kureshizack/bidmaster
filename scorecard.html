<html lang="en">
<head>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-3Y7FEWB710"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Scorecard — captainXI.com</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&family=Noto+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f1724;--surface:#1a2538;--surface2:#243248;--border:#3d5474;--accent:#f59e0b;--text:#f5f7ff;--muted:#9ab0cc;--green:#34d399;--red:#f87171;--blue:#7cb3f5;--purple:#b4a0f5;}
[data-theme="light"]{--bg:#f0f4f8;--surface:#ffffff;--surface2:#e8edf3;--border:#c8d5e2;--accent:#d97706;--text:#1a2535;--muted:#64748b;--green:#16a34a;--red:#dc2626;--blue:#2563eb;--purple:#7c3aed;}
body{transition:background 0.3s,color 0.3s;}
.theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:16px;cursor:pointer;}
/* Sponsor popup banner */
#sponsorBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:9999;text-align:center;padding:10px 16px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;letter-spacing:0.5px;box-shadow:0 4px 20px rgba(0,0,0,0.4);animation:slideDown 0.3s ease;}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes slideUp{from{transform:translateY(0);opacity:1;}to{transform:translateY(-100%);opacity:0;}}
/* Team logos */
.team-logo{width:32px;height:32px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:6px;border:2px solid var(--border);}
.sc-teams-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sc-team-block{display:flex;align-items:center;max-width:42%;}
.sc-team-block.right{flex-direction:row-reverse;}
/* Branding banner */
.branding-strip{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 14px;text-align:center;display:none;}
*{box-sizing:border-box;margin:0;padding:0;}
body{overflow-x:hidden;font-family:'Noto Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.page{max-width:480px;margin:0 auto;}

/* LIVE BADGE */
.live-strip{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;}
.live-dot{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--red);}
.live-dot::before{content:'';width:8px;height:8px;background:var(--red);border-radius:50%;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.share-btn-top{padding:6px 12px;border-radius:6px;border:1px solid var(--accent);background:rgba(245,158,11,0.1);color:var(--accent);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}

/* SCORE CARD */
.sc-main{background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);padding:20px;text-align:center;border-bottom:2px solid var(--accent);}
.sc-teams{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sc-team{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;max-width:40%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sc-team.batting{color:var(--accent);}
.sc-team.bowling{color:var(--muted);}
.sc-vs{font-size:11px;color:var(--muted);font-weight:700;}
.sc-score{font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--text);line-height:1;letter-spacing:3px;}
.sc-wickets{font-family:'Rajdhani',sans-serif;font-size:28px;color:var(--muted);font-weight:700;}
.sc-overs{font-family:'Rajdhani',sans-serif;font-size:18px;color:var(--accent);font-weight:700;margin-top:4px;}
.sc-rr{font-size:13px;color:var(--blue);font-weight:600;margin-top:4px;}
.sc-target{font-size:14px;color:var(--green);font-weight:700;margin-top:6px;padding:6px 14px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);border-radius:8px;display:inline-block;}
.sc-result{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--green);margin-top:8px;}

/* BATSMEN */
.batsmen-section{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px;}
.bat-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid rgba(42,58,85,0.3);}
.bat-row:last-child{border-bottom:none;}
.bat-name{flex:1;font-size:13px;font-weight:600;}
.bat-name.on-strike{color:var(--accent);}
.bat-name.on-strike::after{content:' *';color:var(--accent);}
.bat-r{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;min-width:30px;text-align:right;color:var(--accent);}
.bat-b{font-size:11px;color:var(--muted);min-width:28px;text-align:right;}
.bat-4{font-size:11px;color:var(--green);min-width:20px;text-align:right;}
.bat-6{font-size:11px;color:var(--accent);min-width:20px;text-align:right;}
.bat-sr{font-size:11px;color:var(--muted);min-width:40px;text-align:right;}
.bat-header{display:flex;align-items:center;padding:4px 0;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:700;}
.bat-header span:first-child{flex:1;}

/* BOWLER */
.bowler-section{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;}
.bowl-row{display:flex;align-items:center;padding:4px 0;}
.bowl-name{flex:1;font-size:13px;font-weight:600;color:var(--blue);}
.bowl-stat{font-size:12px;color:var(--muted);min-width:28px;text-align:right;font-family:'Rajdhani',sans-serif;font-weight:600;}

/* OVER BY OVER */
.over-section{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;}
.over-title{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:0.5px;margin-bottom:8px;}
.over-row{display:flex;align-items:center;gap:4px;margin-bottom:6px;flex-wrap:wrap;}
.over-num{font-size:11px;color:var(--muted);font-weight:700;min-width:40px;font-family:'Rajdhani',sans-serif;}
.ball{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1.5px solid var(--border);}
.b-0{background:var(--surface2);color:var(--muted);}
.b-1,.b-2,.b-3{background:rgba(96,165,250,0.12);color:var(--blue);border-color:rgba(96,165,250,0.3);}
.b-4{background:rgba(34,197,94,0.12);color:var(--green);border-color:rgba(34,197,94,0.4);}
.b-6{background:rgba(245,158,11,0.15);color:var(--accent);border-color:rgba(245,158,11,0.4);}
.b-w{background:rgba(239,68,68,0.12);color:var(--red);border-color:rgba(239,68,68,0.4);}
.b-wd,.b-nb{background:rgba(167,139,250,0.1);color:var(--purple);border-color:rgba(167,139,250,0.3);font-size:9px;}
.over-runs{font-size:12px;font-weight:700;color:var(--text);margin-left:4px;font-family:'Rajdhani',sans-serif;}

/* COMMENTARY */
.commentary-section{background:var(--surface);padding:10px 14px;}
.comm-title{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:0.5px;margin-bottom:8px;}
.comm-line{font-size:12px;color:var(--muted);padding:5px 0;border-bottom:1px solid rgba(42,58,85,0.3);line-height:1.5;}
.comm-line:last-child{border-bottom:none;}
.comm-line b{color:var(--text);}
.comm-line .comm-4{color:var(--green);font-weight:700;}
.comm-line .comm-6{color:var(--accent);font-weight:700;}
.comm-line .comm-w{color:var(--red);font-weight:700;}

/* EXTRAS */
.extras-bar{background:var(--surface2);padding:8px 14px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;border-bottom:1px solid var(--border);}

/* TABS */
.sc-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.sc-tab{flex:1;padding:10px;text-align:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;}
.sc-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.sc-tab-content{display:none;}
.sc-tab-content.active{display:block;}

/* SCORECARD TABLE */
.sc-table{width:100%;border-collapse:collapse;font-size:12px;}
.sc-table th{text-align:left;color:var(--muted);font-size:10px;text-transform:uppercase;padding:6px 8px;border-bottom:1px solid var(--border);font-weight:700;}
.sc-table td{padding:5px 8px;border-bottom:1px solid rgba(42,58,85,0.3);}
.sc-table .out{color:var(--muted);}
.sc-table .not-out{color:var(--text);font-weight:600;}
.sc-table .dismissal{font-size:10px;color:var(--muted);display:block;margin-top:1px;}

.loading{text-align:center;padding:60px 20px;color:var(--muted);}
@keyframes celebPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0;}20%{transform:translate(-50%,-50%) scale(1.2);opacity:1;}70%{transform:translate(-50%,-50%) scale(1);opacity:1;}100%{transform:translate(-50%,-70%) scale(0.8);opacity:0;}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

footer{text-align:center;padding:16px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);}
footer a{color:var(--accent);text-decoration:none;}
</style>
</head>
<body>

<div class="page">
  <div id="loadingScreen" class="loading"><div class="spinner"></div>Loading scorecard...</div>

  <div id="scoreScreen" style="display:none;">
    <!-- Live strip -->
    <!-- Sponsor popup banner -->
    <div id="sponsorBanner"></div>

    <!-- Branding strip (organizer) -->
    <div class="branding-strip" id="brandingStrip">
      <span id="brandingText" style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--accent);"></span>
    </div>

    <div class="live-strip">
      <div class="live-dot" id="liveStatus">LIVE</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        <button class="share-btn-top" onclick="shareScorecard()">📱 Share</button>
      </div>

    <!-- Main score -->
    <div class="sc-main">
      <div class="sc-teams">
        <div class="sc-team batting" id="scBatTeam" style="display:flex;align-items:center;gap:6px;">
          <img id="logoA" src="" style="display:none;width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.4);">
          <span id="scBatTeamName">Team A</span>
        </div>
        <div class="sc-vs">VS</div>
        <div class="sc-team bowling" id="scBowlTeam" style="display:flex;align-items:center;gap:6px;flex-direction:row-reverse;">
          <img id="logoB" src="" style="display:none;width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.2);">
          <span id="scBowlTeamName">Team B</span>
        </div>
      </div>
      <div>
        <span class="sc-score" id="scRuns">0</span>
        <span class="sc-wickets" id="scWickets">/0</span>

      <div id="scFirstInnings" style="display:none;font-size:13px;color:var(--muted);margin-top:6px;font-weight:600;"></div>
      <div id="scUmpires" style="display:none;font-size:11px;color:var(--muted);margin-top:6px;">🧑‍⚖️</div>
      <div class="sc-result" id="scResult" style="display:none;"></div>
    </div>

    <!-- Tabs -->
    <div class="sc-tabs">
      <div class="sc-tab active" onclick="switchTab('live')">Live</div>
      <div class="sc-tab" onclick="switchTab('scorecard')">Scorecard</div>
      <div class="sc-tab" onclick="switchTab('commentary')">Commentary</div>
    </div>

    <!-- LIVE TAB -->
    <div class="sc-tab-content active" id="tab-live">
      <!-- Batsmen -->
      <div class="batsmen-section">
        <div class="bat-header"><span>Batsman</span><span style="min-width:30px;text-align:right;">R</span><span style="min-width:28px;text-align:right;">B</span><span style="min-width:20px;text-align:right;">4s</span><span style="min-width:20px;text-align:right;">6s</span><span style="min-width:40px;text-align:right;">SR</span></div>
        <div id="liveBatsmen"></div>
      </div>
      <!-- Bowler -->
      <div class="bowler-section">
        <div class="bat-header"><span>Bowler</span><span style="min-width:28px;text-align:right;">O</span><span style="min-width:28px;text-align:right;">M</span><span style="min-width:28px;text-align:right;">R</span><span style="min-width:28px;text-align:right;">W</span><span style="min-width:40px;text-align:right;">Econ</span></div>
        <div id="liveBowler"></div>
      </div>
      <!-- Extras -->
      <div class="extras-bar" id="liveExtras">Extras: 0</div>
      <!-- Over by over -->
      <div class="over-section">
        <div class="over-title">Over by Over</div>
        <div id="liveOvers"></div>
      </div>
    </div>

    <!-- SCORECARD TAB -->
    <div class="sc-tab-content" id="tab-scorecard">
      <div style="padding:10px 14px;">
        <div id="fullBattingCard"></div>
        <div id="fullBowlingCard" style="margin-top:12px;"></div>
        <div id="fallOfWickets" style="margin-top:12px;font-size:12px;color:var(--muted);"></div>
      </div>
    </div>

    <!-- COMMENTARY TAB -->
    <div class="sc-tab-content" id="tab-commentary">
      <div class="commentary-section" id="fullCommentary"></div>
    </div>
  </div>
</div>

  <!-- Sponsor/ad slot -->
  <div id="adSlot" style="margin:14px;border:2px dashed var(--border);border-radius:10px;padding:14px;text-align:center;background:var(--surface);cursor:pointer;display:none;" onclick="adSlotClick()">
    <div id="adSlotContent" style="font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--accent);">📣 Advertisement · Contact organizer</div>
  </div>

<footer>
  Powered by <a href="https://captainxi.com" style="color:var(--accent);text-decoration:none;">captainXI.com</a> 🏏
</footer>

<script>
const SUPABASE_URL='https://ofondrfejzcznxsvpuec.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mb25kcmZlanpjem54c3ZwdWVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDk5MzMsImV4cCI6MjA4OTE4NTkzM30.5YfDMi0BM07PPJVcp9pfXSg6L5fDldec3usswJQd6no';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let matchId=null;
let _lastBallCount=0;

// ── THEME ────────────────────────────────────────────
const _theme=localStorage.getItem('cxi_sc_theme')||'light';
document.documentElement.setAttribute('data-theme',_theme);
document.addEventListener('DOMContentLoaded',()=>{
  const btn=document.getElementById('themeBtn');
  if(btn) btn.textContent=_theme==='light'?'🌙':'☀️';
});
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('cxi_sc_theme',next);
  document.getElementById('themeBtn').textContent=next==='light'?'🌙':'☀️';
}

// ── SPONSOR BANNER ────────────────────────────────────
function showSponsorBanner(event,matchData){
  const banner=document.getElementById('sponsorBanner');
  if(!banner) return;
  const sponsor=(matchData&&matchData.sponsor_name)||'captainXI.com';
  const colors={four:'linear-gradient(90deg,#16a34a,#15803d)',six:'linear-gradient(90deg,#d97706,#b45309)',wicket:'linear-gradient(90deg,#dc2626,#b91c1c)'};
  const msgs={four:'🏏 FOUR! Brought to you by '+sponsor,six:'💥 SIX! Powered by '+sponsor,wicket:'🎯 WICKET! Presented by '+sponsor};
  banner.style.background=colors[event]||colors.four;
  banner.style.color='#fff';
  banner.textContent=msgs[event]||msgs.four;
  banner.style.display='block';
  banner.style.animation='slideDown 0.3s ease';
  clearTimeout(window._bannerT);
  window._bannerT=setTimeout(()=>{
    banner.style.animation='slideUp 0.3s ease forwards';
    setTimeout(()=>{banner.style.display='none';},300);
  },3500);
}

// ── CELEBRATIONS ─────────────────────────────────────
function celebrateFour(matchData){showSponsorBanner('four',matchData);launchConfetti(['#16a34a','#4ade80','#fff'],25);}
function celebrateSix(matchData){showSponsorBanner('six',matchData);launchConfetti(['#f59e0b','#fbbf24','#ef4444','#fff'],50);showBigText('SIX! 💥','#d97706');}
function celebrateWicket(matchData){showSponsorBanner('wicket',matchData);launchConfetti(['#dc2626','#f87171','#fff'],20);showBigText('WICKET! 🏏','#dc2626');}
function showBigText(txt,color){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:"Bebas Neue",sans-serif;font-size:72px;color:'+color+';text-shadow:0 4px 20px rgba(0,0,0,0.5);pointer-events:none;z-index:9998;animation:celebPop 2.5s forwards;';
  el.textContent=txt;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2600);
}
function launchConfetti(colors,count){
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    const c=colors[Math.floor(Math.random()*colors.length)];
    const l=Math.random()*100,dur=1.5+Math.random()*2,delay=Math.random()*0.4,sz=6+Math.random()*10;
    p.style.cssText='position:fixed;left:'+l+'%;top:-20px;background:'+c+';width:'+sz+'px;height:'+sz+'px;pointer-events:none;z-index:9997;border-radius:'+(Math.random()>0.5?'50%':'2px')+';animation:confettiFall '+dur+'s '+delay+'s linear forwards;';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),(dur+delay+0.1)*1000);
  }
}
function adSlotClick(){if(window._adUrl)window.open(window._adUrl,'_blank');}

let matchData=null,inningsData=null,battingData=[],bowlingData=[],ballsData=[];
let allInnings=[]; // both innings

(async()=>{
  const _p=new URLSearchParams(window.location.search);
  matchId=_p.get('match');
  if(!matchId){
    const code=_p.get('code');
    if(code){const{data:_m}=await sb.from('matches').select('id').eq('share_code',code).maybeSingle();if(_m)matchId=_m.id;}
  }
  if(!matchId){document.getElementById('loadingScreen').innerHTML='<div style="color:var(--red);padding:40px;text-align:center;font-size:18px;">No match specified.</div>';return;}
  await loadAll();
  subscribeRealtime();
  setInterval(loadAll,4000);
})();

async function loadAll(){
  if(!matchId)return;
  const{data:m}=await sb.from('matches').select('*').eq('id',matchId).maybeSingle();
  if(!m)return;
  matchData=m;

  // Load ALL innings (both 1st and 2nd)
  const{data:innings}=await sb.from('innings').select('*').eq('match_id',matchId).order('innings_number');
  allInnings=innings||[];

  // Current/latest innings for live display
  const inn=allInnings.length?allInnings[allInnings.length-1]:null;
  inningsData=inn;

  if(inn){
    const[batRes,bowlRes,ballRes]=await Promise.all([
      sb.from('batting_card').select('*').eq('innings_id',inn.id).order('batting_order'),
      sb.from('bowling_card').select('*').eq('innings_id',inn.id).order('created_at'),
      sb.from('balls').select('*').eq('innings_id',inn.id).order('ball_sequence')
    ]);
    battingData=batRes.data||[];
    bowlingData=bowlRes.data||[];
    const newBalls=ballRes.data||[];
    if(_lastBallCount>0&&newBalls.length>_lastBallCount){
      const latest=newBalls[newBalls.length-1];
      if(latest.runs_bat===4)celebrateFour(m);
      else if(latest.runs_bat===6)celebrateSix(m);
      else if(latest.is_wicket)celebrateWicket(m);
    }
    _lastBallCount=newBalls.length;
    ballsData=newBalls;
  }

  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('scoreScreen').style.display='block';
  renderAll();
}

function subscribeRealtime(){
  sb.channel('scorecard-'+matchId)
    .on('postgres_changes',{event:'*',schema:'public',table:'innings',filter:'match_id=eq.'+matchId},()=>loadAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'balls',filter:'match_id=eq.'+matchId},()=>loadAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'batting_card',filter:'match_id=eq.'+matchId},()=>loadAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'bowling_card',filter:'match_id=eq.'+matchId},()=>loadAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'matches',filter:'id=eq.'+matchId},()=>loadAll())
    .subscribe();
}

function renderAll(){
  if(!inningsData)return;
  const inn=inningsData;

  // Status
  const status=document.getElementById('liveStatus');
  if(matchData.status==='completed'){
    status.textContent='COMPLETED';status.style.color='var(--muted)';
    status.style.setProperty('--dot-color','var(--muted)');
    document.getElementById('scResult').style.display='block';
    document.getElementById('scResult').textContent=matchData.result||'Match completed';
  } else {
    status.textContent='LIVE';
  }

  // Main score
  // Team names with logos
  const batName=inn.batting_team;const bowlName=inn.bowling_team;
  const nameA=document.getElementById('scBatTeamName');const nameB=document.getElementById('scBowlTeamName');
  const logoA=document.getElementById('logoA');const logoB=document.getElementById('logoB');
  if(nameA)nameA.textContent=batName; if(nameB)nameB.textContent=bowlName;
  // Logos from match data - map correctly based on which team is batting
  const isBatTeamA=(inn.batting_team===matchData.team_a);
  const aLogo=isBatTeamA?matchData.team_a_logo:matchData.team_b_logo;
  const bLogo=isBatTeamA?matchData.team_b_logo:matchData.team_a_logo;
  if(logoA&&aLogo){logoA.src=aLogo;logoA.style.display='inline';}else if(logoA){logoA.style.display='none';}
  if(logoB&&bLogo){logoB.src=bLogo;logoB.style.display='inline';}else if(logoB){logoB.style.display='none';}
  // Branding
  if(matchData.branding_text){document.getElementById('brandingStrip').style.display='block';document.getElementById('brandingText').textContent=matchData.branding_text;}
  // Ad slot
  if(matchData.ad_text){const ad=document.getElementById('adSlot');if(ad){ad.style.display='block';document.getElementById('adSlotContent').textContent=matchData.ad_text;window._adUrl=matchData.ad_url||null;}}
  document.getElementById('scBowlTeam').textContent=inn.bowling_team;
  document.getElementById('scRuns').textContent=inn.total_runs;
  document.getElementById('scWickets').textContent='/'+inn.total_wickets;
  document.getElementById('scOvers').textContent='('+inn.current_over+'.'+inn.current_over_balls+' overs)';
  document.getElementById('scCRR').textContent='CRR '+(inn.run_rate||'0.00');

  // Target
  const targetEl=document.getElementById('scTarget');
  if(inn.innings_number===2&&inn.target){
    const need=inn.target-inn.total_runs;
    const ballsLeft=matchData.overs_per_side*6-inn.total_balls;
    targetEl.style.display='inline-block';
    if(need>0){
      targetEl.textContent='Need '+need+' off '+ballsLeft+' balls';
      const rrr=ballsLeft>0?((need/(ballsLeft/6))).toFixed(2):'0.00';
      targetEl.textContent+=' · RRR '+rrr;
    } else {
      targetEl.textContent='🏆 TARGET ACHIEVED!';
    }
  }

  // Show 1st innings score when viewing 2nd innings
  const firstInnEl=document.getElementById('scFirstInnings');
  if(inn.innings_number===2&&allInnings.length>=2){
    const inn1=allInnings[0];
    firstInnEl.style.display='block';
    firstInnEl.textContent=inn1.batting_team+' '+inn1.total_runs+'/'+inn1.total_wickets+' ('+inn1.current_over+'.'+inn1.current_over_balls+' ov)';
  }

  // Umpires
  const umpEl=document.getElementById('scUmpires');
  if(matchData.umpire_1||matchData.umpire_2){
    umpEl.style.display='block';
    umpEl.textContent='🧑‍⚖️ '+(matchData.umpire_1||'')+(matchData.umpire_2?' & '+matchData.umpire_2:'');
  }

  // Batsmen
  const onCrease=battingData.filter(b=>b.is_on_crease);
  document.getElementById('liveBatsmen').innerHTML=onCrease.map(b=>
    '<div class="bat-row">'+
    '<div class="bat-name'+(b.is_striker?' on-strike':'')+'">'+b.player_name+'</div>'+
    '<div class="bat-r">'+b.runs+'</div>'+
    '<div class="bat-b">'+b.balls_faced+'</div>'+
    '<div class="bat-4">'+b.fours+'</div>'+
    '<div class="bat-6">'+b.sixes+'</div>'+
    '<div class="bat-sr">'+(b.strike_rate>0?Number(b.strike_rate).toFixed(0):'0.0')+'</div>'+
    '</div>'
  ).join('');

  // Bowler
  const currentBowler=bowlingData.filter(b=>b.is_current);
  document.getElementById('liveBowler').innerHTML=currentBowler.map(b=>{
    const ov=Math.floor((b.overs_balls||0)/6)+'.'+(b.overs_balls||0)%6;
    return '<div class="bowl-row">'+
    '<div class="bowl-name">'+b.player_name+'</div>'+
    '<div class="bowl-stat">'+ov+'</div>'+
    '<div class="bowl-stat">'+b.maidens+'</div>'+
    '<div class="bowl-stat">'+b.runs_conceded+'</div>'+
    '<div class="bowl-stat" style="color:var(--red);">'+b.wickets+'</div>'+
    '<div class="bowl-stat">'+(b.economy||'0.00')+'</div>'+
    '</div>';
  }).join('');

  // Extras
  document.getElementById('liveExtras').textContent='Extras: '+inn.extras_total+' (wd '+inn.extras_wides+', nb '+inn.extras_noballs+', b '+inn.extras_byes+', lb '+inn.extras_legbyes+')';

  // Over by over
  renderOvers();

  // Full scorecard
  renderFullScorecard();

  // Commentary
  renderCommentary();
}

function renderOvers(){
  const overs={};
  ballsData.forEach(b=>{
    const key=b.over_number;
    if(!overs[key])overs[key]=[];
    overs[key].push(b);
  });

  const el=document.getElementById('liveOvers');
  const overNums=Object.keys(overs).map(Number).sort((a,b)=>b-a); // latest first
  el.innerHTML=overNums.slice(0,6).map(num=>{
    const balls=overs[num];
    const overRuns=balls.reduce((s,b)=>s+b.runs_total,0);
    return '<div class="over-row">'+
      '<span class="over-num">Ov '+(num+1)+'</span>'+
      balls.map(b=>{
        let cls='b-0',txt='•';
        if(b.is_wicket){cls='b-w';txt='W';}
        else if(b.outcome==='wide'){cls='b-wd';txt='Wd';}
        else if(b.outcome==='noball'){cls='b-nb';txt='Nb';}
        else if(b.outcome==='bye'||b.outcome==='legbye'){cls='b-0';txt=b.runs_total+'b';}
        else if(b.runs_bat===0)cls='b-0';
        else if(b.runs_bat===4){cls='b-4';txt='4';}
        else if(b.runs_bat===6){cls='b-6';txt='6';}
        else{cls='b-'+Math.min(b.runs_bat,3);txt=b.runs_bat;}
        return '<div class="ball '+cls+'">'+txt+'</div>';
      }).join('')+
      '<span class="over-runs">'+overRuns+' runs</span>'+
      '</div>';
  }).join('');
}

async function renderFullScorecard(){
  const container=document.getElementById('fullBattingCard');
  const bowlContainer=document.getElementById('fullBowlingCard');
  const fowEl=document.getElementById('fallOfWickets');
  let fullHtml='';
  let fullBowlHtml='';
  let fowHtml='';

  for(const inn of allInnings){
    // Load batting, bowling, balls for this innings
    const[batRes,bowlRes,ballRes]=await Promise.all([
      sb.from('batting_card').select('*').eq('innings_id',inn.id).order('batting_order'),
      sb.from('bowling_card').select('*').eq('innings_id',inn.id).order('created_at'),
      sb.from('balls').select('*').eq('innings_id',inn.id).order('ball_sequence')
    ]);
    const batters=batRes.data||[];
    const bowlers=bowlRes.data||[];
    const balls=ballRes.data||[];

    // Innings header
    const innOvers=inn.current_over+'.'+inn.current_over_balls;
    fullHtml+='<div style="font-family:Rajdhani,sans-serif;font-size:15px;font-weight:700;color:var(--accent);margin:14px 0 6px;border-bottom:1px solid var(--border);padding-bottom:4px;">'+
      inn.batting_team+' — '+inn.total_runs+'/'+inn.total_wickets+' ('+innOvers+' ov)'+
      (inn.innings_number===1?' · 1st Innings':' · 2nd Innings')+
      '</div>';

    // Batting table
    fullHtml+='<table class="sc-table"><thead><tr><th>Batsman</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead><tbody>';
    batters.forEach(b=>{
      const cls=b.is_out?'out':'not-out';
      fullHtml+='<tr><td class="'+cls+'">'+b.player_name+(b.dismissal_text?'<span class="dismissal">'+b.dismissal_text+'</span>':'')+'</td>';
      fullHtml+='<td class="'+cls+'" style="font-weight:700;">'+b.runs+'</td>';
      fullHtml+='<td>'+b.balls_faced+'</td><td>'+b.fours+'</td><td>'+b.sixes+'</td>';
      fullHtml+='<td>'+(b.strike_rate>0?Number(b.strike_rate).toFixed(1):'—')+'</td></tr>';
    });
    fullHtml+='</tbody></table>';

    // Extras
    fullHtml+='<div style="font-size:12px;color:var(--muted);padding:6px 0;">Extras: '+inn.extras_total+' (wd '+inn.extras_wides+', nb '+inn.extras_noballs+', b '+inn.extras_byes+', lb '+inn.extras_legbyes+')</div>';

    // Total
    fullHtml+='<div style="font-size:13px;font-weight:700;color:var(--text);padding:4px 0;border-top:1px solid var(--border);">Total: '+inn.total_runs+'/'+inn.total_wickets+' ('+innOvers+' overs)</div>';

    // Bowling header
    fullBowlHtml+='<div style="font-family:Rajdhani,sans-serif;font-size:15px;font-weight:700;color:var(--blue);margin:14px 0 6px;border-bottom:1px solid var(--border);padding-bottom:4px;">'+
      inn.bowling_team+' Bowling'+(inn.innings_number===1?' · 1st Innings':' · 2nd Innings')+'</div>';

    fullBowlHtml+='<table class="sc-table"><thead><tr><th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>Econ</th></tr></thead><tbody>';
    bowlers.forEach(b=>{
      const ov=Math.floor((b.overs_balls||0)/6)+'.'+(b.overs_balls||0)%6;
      fullBowlHtml+='<tr><td style="font-weight:600;color:var(--blue);">'+b.player_name+'</td>';
      fullBowlHtml+='<td>'+ov+'</td><td>'+b.maidens+'</td><td>'+b.runs_conceded+'</td>';
      fullBowlHtml+='<td style="color:var(--red);font-weight:700;">'+b.wickets+'</td>';
      fullBowlHtml+='<td>'+(b.economy||'—')+'</td></tr>';
    });
    fullBowlHtml+='</tbody></table>';

    // Fall of wickets
    const wicketBalls=balls.filter(b=>b.is_wicket);
    if(wicketBalls.length){
      const fowText=wicketBalls.map((b,i)=>{
        const runsSoFar=balls.filter(bb=>bb.ball_sequence<=b.ball_sequence).reduce((s,bb)=>s+bb.runs_total,0);
        return (i+1)+'-'+runsSoFar;
      }).join(', ');
      fowHtml+='<div style="margin-top:4px;"><b>FOW ('+inn.batting_team+'):</b> '+fowText+'</div>';
    }
  }

  // Umpires
  if(matchData.umpire_1||matchData.umpire_2){
    fowHtml+='<div style="margin-top:10px;font-size:12px;color:var(--muted);">🧑‍⚖️ Umpires: '+(matchData.umpire_1||'')+(matchData.umpire_2?' & '+matchData.umpire_2:'')+'</div>';
  }

  container.innerHTML=fullHtml;
  bowlContainer.innerHTML=fullBowlHtml;
  fowEl.innerHTML=fowHtml;
}

function renderCommentary(){
  const el=document.getElementById('fullCommentary');
  const recent=ballsData.slice().reverse().slice(0,30);
  el.innerHTML=recent.map(b=>{
    let extraClass='';
    if(b.runs_bat===4)extraClass='comm-4';
    if(b.runs_bat===6)extraClass='comm-6';
    if(b.is_wicket)extraClass='comm-w';
    const overStr=(b.over_number+1)+'.'+b.ball_number;
    return '<div class="comm-line"><b>'+overStr+'</b> <span class="'+extraClass+'">'+(b.commentary||b.outcome)+'</span></div>';
  }).join('');
}

function switchTab(name){
  document.querySelectorAll('.sc-tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.sc-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelector('.sc-tab[onclick="switchTab(\''+name+'\')"]').classList.add('active');
}

async function shareScorecard(){
  if(!matchData)return;
  const url=window.location.origin+'/scorecard.html?code='+(matchData.share_code||matchData.id);

  let msg='';

  for(const inn of allInnings){
    const innOvers=inn.current_over+'.'+inn.current_over_balls;
    msg+='🏏 *'+inn.batting_team+'* '+inn.total_runs+'/'+inn.total_wickets+' ('+innOvers+' ov)'+(inn.innings_number===1?' · 1st Innings':' · 2nd Innings')+'\n';

    // Load batters for this innings
    const{data:batters}=await sb.from('batting_card').select('*').eq('innings_id',inn.id).order('batting_order');
    if(batters&&batters.length){
      batters.forEach(b=>{
        const status=b.is_out?'':'*';
        msg+=b.player_name+' '+b.runs+status+'('+b.balls_faced+') '+(b.fours?b.fours+'×4 ':'')+(b.sixes?b.sixes+'×6':'')+'\n';
      });
    }
    // Extras
    if(inn.extras_total>0){
      msg+='Extras: '+inn.extras_total+' (wd '+inn.extras_wides+', nb '+inn.extras_noballs+', b '+inn.extras_byes+', lb '+inn.extras_legbyes+')\n';
    }
    msg+='\n';
  }

  // Match result
  if(matchData.result){
    msg+='🏆 *'+matchData.result+'*\n';
  } else if(inningsData&&inningsData.innings_number===2&&inningsData.target){
    const need=inningsData.target-inningsData.total_runs;
    msg+='Need '+need+' to win\n';
  }

  // Umpires
  if(matchData.umpire_1||matchData.umpire_2){
    msg+='🧑‍⚖️ Umpires: '+(matchData.umpire_1||'')+(matchData.umpire_2?' & '+matchData.umpire_2:'')+'\n';
  }

  msg+='\n🔗 '+url;
  msg+='\ncaptainXI.com 🏏';

  // Open WhatsApp directly
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
  const btn=document.querySelector('.share-btn-top');
  if(btn){btn.textContent='✅ Shared!';setTimeout(()=>btn.textContent='📱 Share',2000);}
}
</script>
